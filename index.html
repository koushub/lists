<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Lists Wiki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              gray: {
                850: '#1f2937',
                900: '#111827',
                950: '#030712',
              }
            }
          }
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        body { background-color: #030712; color: #e5e7eb; }
        .markdown-body { color: #d1d5db; font-size: 1.05rem; line-height: 1.6; }
        .markdown-body h1 { font-size: 2.5rem; font-weight: 800; color: #f9fafb; margin-bottom: 1.5rem; border-bottom: 2px solid #374151; padding-bottom: 0.5rem; }
        .markdown-body h2 { font-size: 1.7rem; font-weight: 700; color: #f3f4f6; margin-top: 2.5rem; margin-bottom: 1rem; border-bottom: 1px solid #374151; padding-bottom: 0.5rem; }
        .markdown-body h3 { font-size: 1.3rem; font-weight: 600; color: #e5e7eb; margin-top: 2rem; margin-bottom: 1rem; }
        .markdown-body ul { list-style-type: none; padding-left: 0; margin-bottom: 1.5rem; }
        .markdown-body li { margin-bottom: 0.75rem; padding-left: 1.5rem; position: relative; }
        .markdown-body li::before { content: '•'; position: absolute; left: 0; color: #3b82f6; font-weight: bold; font-size: 1.2rem; line-height: 1; top: 0.1rem; }
        .markdown-body ul ul { padding-left: 1.5rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
        .markdown-body ul ul li::before { content: '◦'; color: #6b7280; }
        .markdown-body a { color: #60a5fa; text-decoration: none; font-weight: 500; transition: color 0.15s ease-in-out; }
        .markdown-body a:hover { color: #93c5fd; text-decoration: underline; }
        .markdown-body code { background-color: #1f2937; color: #f472b6; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-size: 0.875em; border: 1px solid #374151; font-family: ui-monospace, monospace; }
        .markdown-body blockquote { border-left: 4px solid #4b5563; padding-left: 1rem; color: #9ca3af; font-style: italic; margin-bottom: 1.5rem; }
        .markdown-body p { margin-bottom: 1.25rem; }
        .markdown-body hr { margin: 2rem 0; border: 0; border-top: 1px solid #374151; }
        
        .nav-link.active { background-color: rgba(37, 99, 235, 0.15); color: #60a5fa; font-weight: 600; border-left: 3px solid #3b82f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .loader { border: 4px solid #1f2937; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

        function b64DecodeUnicode(str) {
            return decodeURIComponent(atob(str).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        document.addEventListener("DOMContentLoaded", () => {
            try {
                const markdownContent = b64DecodeUnicode(b64_content);
                
                marked.setOptions({
                    headerIds: true,
                    gfm: true,
                    breaks: false
                });

                let rawHtml = marked.parse(markdownContent);
                const contentDiv = document.getElementById('content');
                contentDiv.innerHTML = DOMPurify.sanitize(rawHtml);

                const headers = contentDiv.querySelectorAll('h2, h3');
                const tocDiv = document.getElementById('toc');
                const tocList = document.createElement('ul');
                tocList.className = 'space-y-1';

                headers.forEach((header) => {
                    const level = parseInt(header.tagName.replace('H', ''));
                    let id = header.id || header.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-');
                    if (!id) id = 'section-' + Math.random().toString(36).substr(2, 9);
                    header.id = id;

                    const li = document.createElement('li');
                    
                    const a = document.createElement('a');
                    a.href = '#' + id;
                    a.textContent = header.textContent;
                    
                    let baseClass = 'nav-link block transition-all duration-200 border-l-[3px] border-transparent ';
                    if (level === 2) {
                        a.className = baseClass + 'px-3 py-2 text-[0.95rem] font-bold text-gray-300 hover:bg-gray-800 mt-2 rounded border-l-0 hover:text-white';
                    } else if (level === 3) {
                        a.className = baseClass + 'px-3 py-1.5 pl-6 text-[0.85rem] font-medium text-gray-500 hover:bg-gray-800 rounded border-l-0 hover:text-gray-300';
                    }
                    
                    li.appendChild(a);
                    tocList.appendChild(li);

                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        const target = document.getElementById(id);
                        if(target) {
                            const mainScroll = document.getElementById('mainScroll');
                            mainScroll.scrollTo({
                                top: target.offsetTop - 20,
                                behavior: 'smooth'
                            });
                        }
                        if(window.innerWidth < 768) {
                            document.getElementById('sidebar').classList.add('-translate-x-full');
                            document.getElementById('sidebar').classList.remove('absolute', 'w-full');
                        }
                    });
                });
                tocDiv.appendChild(tocList);

                setTimeout(() => {
                    const loader = document.getElementById('loader');
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 300);
                    contentDiv.classList.remove('opacity-0');
                }, 300);

                const searchInput = document.getElementById('searchInput');
                const searchStats = document.getElementById('searchStats');
                const matchCount = document.getElementById('matchCount');
                
                const listItems = Array.from(contentDiv.querySelectorAll('li')).filter(li => !li.querySelector('ul'));
                
                let searchTimeout;
                searchInput.addEventListener('input', (e) => {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(() => {
                        const query = e.target.value.toLowerCase().trim();
                        
                        if (!query) {
                            listItems.forEach(li => li.style.display = '');
                            headers.forEach(h => h.style.display = '');
                            searchStats.classList.add('hidden');
                            return;
                        }

                        let count = 0;
                        listItems.forEach(li => {
                            const text = li.textContent.toLowerCase();
                            if (text.includes(query)) {
                                li.style.display = '';
                                count++;
                            } else {
                                li.style.display = 'none';
                            }
                        });

                        matchCount.textContent = count;
                        searchStats.classList.remove('hidden');
                    }, 250);
                });

                const mainScroll = document.getElementById('mainScroll');
                const observerOptions = {
                    root: mainScroll,
                    rootMargin: '-20px 0px -80% 0px',
                    threshold: 0
                };

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const id = entry.target.id;
                            const navLink = document.querySelector(`.nav-link[href="#${id}"]`);
                            if (navLink) {
                                document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
                                navLink.classList.add('active');
                                
                                const tocScroll = document.getElementById('toc');
                                const linkTop = navLink.offsetTop;
                                if (linkTop < tocScroll.scrollTop || linkTop > tocScroll.scrollTop + tocScroll.clientHeight - 50) {
                                    tocScroll.scrollTo({
                                        top: linkTop - 100,
                                        behavior: 'smooth'
                                    });
                                }
                            }
                        }
                    });
                }, observerOptions);

                headers.forEach(header => observer.observe(header));

                const backToTop = document.getElementById('backToTop');
                mainScroll.addEventListener('scroll', () => {
                    if (mainScroll.scrollTop > 500) {
                        backToTop.classList.remove('opacity-0', 'pointer-events-none', 'transform', 'translate-y-4');
                    } else {
                        backToTop.classList.add('opacity-0', 'pointer-events-none', 'transform', 'translate-y-4');
                    }
                });

                backToTop.addEventListener('click', () => {
                    mainScroll.scrollTo({ top: 0, behavior: 'smooth' });
                });

                contentDiv.querySelectorAll('a[href^="#"]').forEach(a => {
                    a.addEventListener('click', (e) => {
                        const id = a.getAttribute('href').substring(1);
                        const target = document.getElementById(id);
                        if (target) {
                            e.preventDefault();
                            mainScroll.scrollTo({
                                top: target.offsetTop - 40,
                                behavior: 'smooth'
                            });
                        }
                    })
                });

                const toggleMenu = document.getElementById('toggleMenu');
                const sidebar = document.getElementById('sidebar');
                
                if (window.innerWidth < 768) {
                    sidebar.classList.add('-translate-x-full');
                }

                toggleMenu.addEventListener('click', () => {
                    sidebar.classList.toggle('-translate-x-full');
                    if (!sidebar.classList.contains('-translate-x-full')) {
                        sidebar.classList.add('absolute', 'w-full');
                        sidebar.style.height = '100vh';
                    } else {
                        setTimeout(() => sidebar.classList.remove('absolute', 'w-full'), 300);
                    }
                });

            } catch(e) {
                console.error("Error setting up Wiki:", e);
                document.getElementById('content').innerHTML = `
                    <div class="bg-red-900 border-l-4 border-red-500 p-4 rounded text-red-100">
                        <p class="font-bold">Error</p>
                        <p class="text-sm">Error parsing wiki content. Please check console.</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
